<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salle {{ code }} — Lobby</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="bg">
    <main class="container">
      <div class="card hero">
        <div class="hero-top">
          <div>
            <div class="pill">⏳ Salle d’attente</div>
            <h1 class="roomcode">{{ code }}</h1>
            <div class="sub">
              Partage le lien : <span class="mono" id="shareUrl">...</span>
            </div>
          </div>
          <div class="hero-actions">
            <button class="btn ghost" id="copyLinkBtn">📋 Copier le lien</button>
            <button class="btn primary" id="startBtn" style="display:none;">🚀 Lancer la partie</button>
          </div>
        </div>

        <div class="waiting">
          <div class="spinner"></div>
          <div class="waiting-text" id="waitingText">En attente de joueurs...</div>
        </div>
      </div>

      <div class="grid-2">
        <section class="card">
          <h2>Joueurs</h2>
          <div class="players" id="playersList"></div>
          <p class="hint" id="minPlayersHint">Minimum 2 joueurs pour démarrer.</p>
        </section>

        <section class="card">
          <h2>Réglages</h2>
          <div class="kv">
            <div class="k">Thème</div>
            <div class="v" id="themeVal">—</div>
            <div class="k">Difficulté</div>
            <div class="v" id="difficultyVal">—</div>
            <div class="k">Questions</div>
            <div class="v" id="countVal">—</div>
          </div>
          <div class="divider"></div>
          <button class="btn danger" id="leaveBtn">🚪 Quitter</button>
        </section>
      </div>
    </main>

    <script>
      window.QUIZ_CODE = "{{ code }}";
      window.QUIZ_PAGE = "lobby";
    </script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
  </body>
</html>
